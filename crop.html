<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather-Based Farming Advisor - Crop Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-seedling"></i> Farming Advisor
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}"><i class="fas fa-home"></i> Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#"><i class="fas fa-seedling"></i> Crop</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-success text-white text-center py-4">
                        <h2><i class="fas fa-seedling"></i> Crop Details</h2>
                        <p class="mb-0">Select your crop and soil type</p>
                    </div>
                    <div class="card-body p-4">
                        <form action="{{ url_for('recommendation') }}" method="POST" id="cropForm">
                            <!-- Crop Name -->
                            <div class="mb-3">
                                <label for="crop_name" class="form-label"><i class="fas fa-plant-wilt text-success"></i> Crop Name</label>
                                <select class="form-select" id="crop_name" name="crop_name" required>
                                    <option value="">Select Crop</option>
                                    <option value="Rice">Rice</option>
                                    <option value="Wheat">Wheat</option>
                                    <option value="Maize">Maize</option>
                                    <option value="Cotton">Cotton</option>
                                    <option value="Sugarcane">Sugarcane</option>
                                    <option value="Groundnut">Groundnut</option>
                                    <option value="Tomato">Tomato</option>
                                    <option value="Onion">Onion</option>
                                    <option value="Banana">Banana</option>
                                    <option value="Millets">Millets</option>
                                </select>
                            </div>

                            <!-- Soil Type -->
                            <div class="mb-3">
                                <label for="soil_type" class="form-label"><i class="fas fa-mountain text-success"></i> Soil Type</label>
                                <select class="form-select" id="soil_type" name="soil_type" required>
                                    <option value="">Select Soil Type</option>
                                    <option value="Black Soil">Black Soil</option>
                                    <option value="Red Soil">Red Soil</option>
                                    <option value="Sandy Soil">Sandy Soil</option>
                                    <option value="Clay Soil">Clay Soil</option>
                                    <option value="Loamy Soil">Loamy Soil</option>
                                    <option value="Laterite Soil">Laterite Soil</option>
                                    <option value="Alluvial Soil">Alluvial Soil</option>
                                </select>
                            </div>

                            <!-- Buttons -->
                            <div class="d-flex gap-2 mt-4">
                                <a href="{{ url_for('index') }}" class="btn btn-secondary btn-lg flex-fill">
                                    <i class="fas fa-arrow-left"></i> Previous
                                </a>
                                <button type="submit" class="btn btn-success btn-lg flex-fill">
                                    <i class="fas fa-arrow-right"></i> Next
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white mt-5 py-4">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 Weather-Based Farming Advisor. All rights reserved.</p>
            <small class="text-muted">Empowering farmers with smart agricultural decisions</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
